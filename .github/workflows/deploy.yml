name: Build & Deploy

# Zwei Trigger (PLAN.md 3.4): bei Push auf main + stündlich (Minute 17).
on:
  push:
    branches: [main]
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

permissions:
  contents: write # Snapshot zurück-committen
  pages: write # Deploy zu GitHub Pages
  id-token: write

# Überlappende Deploys vermeiden.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Abhängigkeiten
        run: npm ci

      # prebuild holt Daten + Stadien/Aufstellungen (API-Football) + Wetter + .ics,
      # danach Astro-Build. Bei API-Fehlern bleibt der committete Snapshot.
      - name: Build
        env:
          FOOTBALL_API_KEY: ${{ secrets.FOOTBALL_API_KEY }}
        run: npm run build

      # Frisch geholten Snapshot zurück ins Repo (PLAN.md 3.4). [skip ci]
      # verhindert eine Endlosschleife durch den Push-Trigger.
      - name: Snapshot aktualisieren
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/matches.json src/data/live.json src/data/weather.json
          git commit -m "chore: Daten-Snapshot aktualisiert [skip ci]" || echo "Keine Änderung"
          git push || echo "Push übersprungen"

      - name: Pages konfigurieren
        uses: actions/configure-pages@v5

      - name: Artefakt hochladen
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
